# Build APK (debug) for the Castelli mentali Capacitor app on push/PR to the feature branch.
name: Castelli mentali APK

on:
  push:
    branches:
      - feat/castelli-mentali-apk
    paths:
      - "castelli-mentali-apk/**"
      - ".github/workflows/castelli-mentali-apk.yml"
  pull_request:
    branches:
      - main
    paths:
      - "castelli-mentali-apk/**"
      - ".github/workflows/castelli-mentali-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: castelli-mentali-apk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: castelli-mentali-apk/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Assemble debug APK
        run: cd android && ./gradlew --no-daemon assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: castelli-mentali-debug-apk
          path: castelli-mentali-apk/android/app/build/outputs/apk/debug/app-debug.apk
